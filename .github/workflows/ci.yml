name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Probe secure Vercel deploy credential availability
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN_CONFIGURED"
          else
            echo "VERCEL_TOKEN_MISSING"
          fi
      - run: npm install --ignore-scripts --no-audit --no-fund --loglevel=error
      - name: Typecheck
        run: npm run typecheck > typecheck.log 2>&1 || { cat typecheck.log; exit 1; }
      - name: Upload TypeScript diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: error
      - run: npm run lint
      - run: npm run build
      - name: Verify AI OS security and real-data contracts
        run: node scripts/verify-ai-os-contracts.mjs
      - name: Verify AI media ownership and private storage contracts
        run: node scripts/verify-ai-media-hardening.mjs
      - name: Verify Supabase settings and booking RPC
        run: node scripts/verify-supabase-booking.mjs
