name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts --no-audit --no-fund --loglevel=error
      - name: Typecheck
        run: npm run typecheck > typecheck.log 2>&1 || { cat typecheck.log; exit 1; }
      - name: Upload TypeScript diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: error
      - run: npm run lint
      - run: npm run build
      - name: Verify public SEO, localization, and indexing boundaries
        run: npm run verify:public-seo
      - name: Verify international booking phone contracts
        run: npm run verify:international-booking-phone > international-phone-verification.log 2>&1 || { cat international-phone-verification.log; exit 1; }
      - name: Upload international phone diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: international-phone-diagnostics
          path: international-phone-verification.log
          if-no-files-found: error
      - name: Run non-production booking phone integration tests
        run: npm run test:e2e:booking-phone
      - name: Verify Content Brain cadence and fatigue boundaries
        run: npm run verify:content-brain
      - name: Verify Meta publishing receipts and Planner schedule suggestions
        run: npm run verify:meta-publishing
      - name: Verify autonomous content media worker contracts
        run: npm run verify:content-media-worker
      - name: Verify server-side content automation scheduler
        run: npm run verify:content-automation-scheduler
      - name: Verify modern and legacy Supabase server-key compatibility
        run: npm run verify:supabase-server-key
      - name: Verify password recovery flow contracts
        run: npm run verify:password-recovery
      - name: Verify Vercel automated preview build policy
        run: node scripts/verify-vercel-build-policy.mjs
      - name: Verify AI OS security and real-data contracts
        run: node scripts/verify-ai-os-contracts.mjs
      - name: Verify AI media ownership and private storage contracts
        run: node scripts/verify-ai-media-hardening.mjs
      - name: Verify AI media E2E admin contracts
        run: node scripts/verify-ai-media-e2e-admin-contracts.mjs
      - name: Verify Supabase booking settings without writes
        run: node scripts/verify-supabase-booking.mjs
