name: Normalized CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  supply-chain:
    name: supply-chain
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - name: Install from lockfile without lifecycle scripts
        run: npm ci --ignore-scripts --no-audit --no-fund --loglevel=error
      - name: Verify lockfile integrity
        run: npm ci --ignore-scripts --package-lock-only --dry-run
      - name: Audit runtime dependencies
        run: npm audit --omit=dev
      - name: Check unused packages
        run: npx --yes depcheck@1.4.7
      - name: Check licenses
        run: npx --yes license-checker-rseidelsohn@4.4.2 --production --summary
      - name: Generate CycloneDX SBOM
        run: npm sbom --sbom-format cyclonedx > sbom.cdx.json
      - name: Verify dependency and workflow supply-chain boundaries
        run: node scripts/verify-dependency-supply-chain.mjs
      - name: Verify Actions are SHA pinned
        run: |
          if grep -RInE 'uses:[[:space:]]+[^[:space:]]+@(v[0-9]+|main|master)([[:space:]#]|$)' .github/workflows; then
            echo 'Floating GitHub Action reference found.' >&2
            exit 1
          fi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: swim-fluent-sbom
          path: sbom.cdx.json
          if-no-files-found: error

  verify-source:
    name: verify:source
    needs: supply-chain
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: npm ci --ignore-scripts --no-audit --no-fund --loglevel=error
      - run: npm run typecheck
      - run: npm run lint

  test-unit:
    name: test:unit
    needs: supply-chain
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: npm ci --ignore-scripts --no-audit --no-fund --loglevel=error
      - run: npm run test:unit

  test-security:
    name: test:security
    needs: supply-chain
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: npm ci --ignore-scripts --no-audit --no-fund --loglevel=error
      - run: npm run test:security

  test-contracts:
    name: test:contracts
    needs: supply-chain
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: npm ci --ignore-scripts --no-audit --no-fund --loglevel=error
      - run: npm run test:contracts
      - run: node scripts/verify-production-readiness.mjs
      - run: node scripts/verify-legacy-repository-parity-gate.mjs
      - run: node scripts/verify-ai-os-contracts.mjs
      - run: node scripts/verify-ai-media-hardening.mjs
      - run: node scripts/verify-ai-media-e2e-admin-contracts.mjs
      - run: node scripts/verify-production-workflows-manual-only.mjs
      - run: node scripts/verify-supabase-booking-readonly.mjs

  verify-ci:
    name: verify:ci
    needs: [verify-source, test-unit, test-security, test-contracts]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: npm ci --ignore-scripts --no-audit --no-fund --loglevel=error
      - run: npm run build:dev
      - run: npm run build

  verify-release:
    name: verify:release
    needs: verify-ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: npm ci --ignore-scripts --no-audit --no-fund --loglevel=error
      - run: npm run verify:public-seo
      - run: npm run verify:production-sitemap
      - run: npm run verify:public-free-claims
      - run: npm run verify:chatbot-phase1
      - run: npm run verify:content-brain
      - run: npm run verify:meta-publishing
      - run: npm run verify:content-media-worker
      - run: npm run verify:content-automation-scheduler
      - run: npm run verify:supabase-server-key
      - run: npm run verify:password-recovery
      - run: node scripts/verify-vercel-build-policy.mjs
