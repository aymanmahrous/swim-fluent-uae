name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  E2E_BASE_URL: https://swim-fluent-uae-w532-git-ag-a522bb-swimmingayman-8492s-projects.vercel.app
  E2E_CREDENTIALS_PATH: /tmp/relax-fix-ai-media-e2e.json

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts --no-audit --no-fund --loglevel=error
      - name: Typecheck
        run: npm run typecheck > typecheck.log 2>&1 || { cat typecheck.log; exit 1; }
      - name: Upload TypeScript diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: error
      - run: npm run lint
      - run: npm run build
      - name: Verify AI OS security and real-data contracts
        run: node scripts/verify-ai-os-contracts.mjs
      - name: Verify AI media ownership and private storage contracts
        run: node scripts/verify-ai-media-hardening.mjs
      - name: Verify Supabase settings and booking RPC
        run: node scripts/verify-supabase-booking.mjs
      - name: Wait for matching Vercel preview
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.number == 9 &&
          github.head_ref == 'agent/verify-ai-media-e2e' &&
          contains(github.event.pull_request.labels.*.name, 'ai-media-e2e')
        run: |
          for attempt in $(seq 1 60); do
            status=$(curl --silent --output /dev/null --write-out '%{http_code}' "$E2E_BASE_URL/staff" || true)
            if [ "$status" = "200" ]; then
              exit 0
            fi
            sleep 5
          done
          echo "Vercel preview was not reachable with HTTP 200" >&2
          exit 1
      - name: Install Playwright Chromium
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.number == 9 &&
          github.head_ref == 'agent/verify-ai-media-e2e' &&
          contains(github.event.pull_request.labels.*.name, 'ai-media-e2e')
        run: npx playwright install --with-deps chromium
      - name: Provision isolated temporary staff
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.number == 9 &&
          github.head_ref == 'agent/verify-ai-media-e2e' &&
          contains(github.event.pull_request.labels.*.name, 'ai-media-e2e')
        run: node scripts/ai-media-e2e-admin.mjs provision
      - name: Run real AI Image and AI Video browser E2E
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.number == 9 &&
          github.head_ref == 'agent/verify-ai-media-e2e' &&
          contains(github.event.pull_request.labels.*.name, 'ai-media-e2e')
        run: npm run test:e2e:ai-media
      - name: Cleanup isolated E2E users and media
        if: >-
          always() &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.number == 9 &&
          github.head_ref == 'agent/verify-ai-media-e2e' &&
          contains(github.event.pull_request.labels.*.name, 'ai-media-e2e')
        run: node scripts/ai-media-e2e-admin.mjs cleanup
      - name: Upload browser diagnostics
        if: >-
          failure() &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.number == 9 &&
          github.head_ref == 'agent/verify-ai-media-e2e' &&
          contains(github.event.pull_request.labels.*.name, 'ai-media-e2e')
        uses: actions/upload-artifact@v4
        with:
          name: ai-media-e2e-diagnostics
          path: test-results
          if-no-files-found: ignore
