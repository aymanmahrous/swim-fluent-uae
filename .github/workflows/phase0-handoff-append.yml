name: Phase 0 Handoff Append

on:
  push:
    branches: [feat/phase0-constitution]

permissions:
  contents: write

jobs:
  append-handoff:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/phase0-constitution
      - name: Append Phase 0 evidence safely
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('PROJECT_HANDOFF.md')
          text = path.read_text(encoding='utf-8')
          marker = '## 18. Phase 0 constitution and governance receipt — 2026-07-23'
          if marker in text:
              raise SystemExit(0)

          section = r'''

## 18. Phase 0 constitution and governance receipt — 2026-07-23

Status: `PHASE_0_COMPLETE_AWAITING_OWNER_PHASE_1_AUTHORIZATION`

### Scope and isolation

- Repository: `aymanmahrous/swim-fluent-uae`.
- Strategy preserved: `REVENUE-FIRST PARALLEL LAUNCH`.
- Branch: `feat/phase0-constitution`.
- Base and verified GitHub `main`: `493289513970042475828358ffcfe31afa1a694e`.
- Vercel Production deployment at the Phase 0 baseline: `dpl_6Pn4tWxULisrvAgfbV9gSHbMBFCN`, state `READY`, Git commit `3d713190f0e995a3142f2f14385d312cb984b334`.
- GitHub `main` was verified as 8 commits ahead of that Production commit; Production was 0 commits ahead of `main`.
- `main` branch protection was verified as `protected=false`; no GitHub Rulesets were verified.
- Phase 0 changed only `AGENT_CONSTITUTION.md` and `PROJECT_HANDOFF.md` in the final PR diff.

### Delivered governance baseline

- `AGENT_CONSTITUTION.md` separates Relax Fix UAE, Command Center Hub under Issue #76 only, and the intentionally paused mobile coach application.
- It locks Revenue-First strategy, prohibits direct push to `main`, requires one phase at a time and a Draft PR per phase, preserves human approval gates, records data/Production/Supabase/messaging/publishing/Ads/content prohibitions, and defines Phase 0 through Phase 8.

### Commit, PR, CI, tests, and Preview evidence

- Initial constitution commit: `32901d008c3cb3cd9b2f470c5bd0f3e3b8da8cc3`.
- Draft PR: #168 — `https://github.com/aymanmahrous/swim-fluent-uae/pull/168`.
- Initial GitHub CI run: `29968180290`, run #601, result `PASS`.
- `npm run verify:public-seo`: `PASS` through CI run `29968180290`.
- `npm run verify:public-free-claims`: `PASS` through CI run `29968180290`.
- Initial Vercel Preview deployment: `dpl_3QChmyfAthrtSmEisFSWZd96X2MY`.
- Initial Vercel Preview state: `READY`.
- Initial Preview URL: `https://swim-fluent-uae-w532-2prm8z3dv-swimmingayman-8492s-projects.vercel.app`.
- Target: Preview only, not Production.
- Final Handoff update commit, final CI run/result, and final Preview receipt are recorded in PR #168 after this evidence commit becomes available.

### Protected actions not performed

- No push to `main` and no merge.
- No Production deployment, promotion, rollback, domain change, Supabase migration, `db push`, migration repair, migration-history edit, seed, database write, Storage write, or automation-pulse activation.
- The Supabase pulse remains `active=false`.
- No secret or Environment Variable change.
- No real booking, real learner/customer/child data, WhatsApp, email, SMS, automated outbound message, scheduling, publishing, Ads, billing, or spend.
- No Batch A1 regeneration, no Batch A2, no Doha Sportive Center reuse, and no `media-storage` authentication convention change.
- Phase 1 was not started.

### Next action

Stop after Phase 0 and obtain explicit owner authorization before beginning Phase 1.
'''
          path.write_text(text.rstrip() + section + '\n', encoding='utf-8')
          PY
      - name: Commit Handoff evidence
        shell: bash
        run: |
          if git diff --quiet -- PROJECT_HANDOFF.md; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PROJECT_HANDOFF.md
          git commit -m "docs: record Phase 0 completion evidence"
          git push origin HEAD:feat/phase0-constitution
