name: Manual AI Media Workflow Safety Validation

on:
  push:
    branches:
      - chore/manual-production-ai-media-e2e

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Parse workflow YAML
        run: |
          ruby -e 'require "yaml"; ARGV.each { |file| YAML.parse_file(file); puts "parsed #{file}" }' \
            .github/workflows/ai-media-e2e.yml \
            .github/workflows/ai-media-current-production-e2e.yml \
            .github/workflows/ai-media-live-fallback.yml
      - name: Verify manual-only workflow contracts
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const workflows = {
            ".github/workflows/ai-media-e2e.yml": {
              baseUrl: "https://swim-fluent-uae-w532.vercel.app",
              adminUrl: "https://nmzxrjdxvmmzzmajrskm.supabase.co/functions/v1/ai-media-e2e-admin",
              job: "ai-media-e2e",
            },
            ".github/workflows/ai-media-current-production-e2e.yml": {
              baseUrl: "https://swim-fluent-uae-w532.vercel.app",
              adminUrl: "https://nmzxrjdxvmmzzmajrskm.supabase.co/functions/v1/ai-media-e2e-admin",
              job: "ai-media-current-production-e2e",
            },
            ".github/workflows/ai-media-live-fallback.yml": {
              baseUrl: "https://swim-fluent-uae-w532-3xid5nr1v-swimmingayman-8492s-projects.vercel.app",
              adminUrl: "https://nmzxrjdxvmmzzmajrskm.supabase.co/functions/v1/ai-media-e2e-admin",
              job: "ai-media-live-fallback",
            },
          };

          const fail = (message) => {
            throw new Error(message);
          };

          for (const [file, expected] of Object.entries(workflows)) {
            const source = fs.readFileSync(file, "utf8");
            if (!/^on:\n  workflow_dispatch:\n/m.test(source)) fail(`${file}: workflow_dispatch missing`);
            if (/^  (push|pull_request|schedule):/m.test(source)) fail(`${file}: automatic trigger found`);
            if (!/confirm_production_writes:\n        description:[^\n]+\n        required: true\n        default: false\n        type: boolean/m.test(source)) fail(`${file}: confirmation input invalid`);
            if (!/execution_reason:\n        description:[^\n]+\n        required: true\n        type: string/m.test(source)) fail(`${file}: execution_reason input invalid`);
            if (!/target_sha:\n        description:[^\n]+\n        required: true\n        type: string/m.test(source)) fail(`${file}: target_sha input invalid`);
            if (!source.includes("github.event_name == 'workflow_dispatch'")) fail(`${file}: event guard missing`);
            if (!source.includes("github.ref == 'refs/heads/main'")) fail(`${file}: main-only guard missing`);
            if (!source.includes("inputs.confirm_production_writes == true")) fail(`${file}: confirmation guard missing`);
            if (!source.includes("inputs.target_sha == github.sha")) fail(`${file}: SHA guard missing`);
            if (!source.includes("inputs.execution_reason != ''")) fail(`${file}: reason guard missing`);
            if (!source.includes("group: production-ai-media-live-e2e")) fail(`${file}: shared concurrency missing`);
            if (!source.includes("cancel-in-progress: false")) fail(`${file}: cancellation guard missing`);
            if (!source.includes("contents: read\n  id-token: write\n  statuses: write")) fail(`${file}: permissions changed unexpectedly`);
            if (source.includes("${{ secrets.")) fail(`${file}: secret reference added`);
            if (source.includes("environment:")) fail(`${file}: unverified environment binding added`);
            if (!source.includes(`E2E_BASE_URL: ${expected.baseUrl}`)) fail(`${file}: target URL changed`);
            if (!source.includes(`E2E_ADMIN_URL: ${expected.adminUrl}`)) fail(`${file}: admin URL changed`);
            if (!source.includes(`  ${expected.job}:\n    if:`)) fail(`${file}: job-level guard not first-class`);
            const guardIndex = source.indexOf("Validate manual Production authorization");
            const provisionIndex = source.indexOf("Provision isolated temporary staff");
            const generationIndex = source.indexOf("Run real AI Image and AI Video");
            if (guardIndex < 0 || provisionIndex < 0 || generationIndex < 0 || guardIndex > provisionIndex || guardIndex > generationIndex) {
              fail(`${file}: paid/write steps are not behind authorization validation`);
            }
          }

          console.log("Manual-only Production AI Media workflow contracts passed.");
          NODE
      - run: npm install --ignore-scripts --no-audit --no-fund --loglevel=error
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Production build
        run: npm run build
      - name: Existing non-live regression contracts
        run: |
          npm run verify:public-seo
          npm run verify:content-brain
          npm run verify:meta-publishing
          npm run verify:content-media-worker
          npm run verify:content-automation-scheduler
          npm run verify:supabase-server-key
          npm run verify:password-recovery
          node scripts/verify-vercel-build-policy.mjs
          node scripts/verify-ai-os-contracts.mjs
          node scripts/verify-ai-media-hardening.mjs
          node scripts/verify-ai-media-e2e-admin-contracts.mjs
