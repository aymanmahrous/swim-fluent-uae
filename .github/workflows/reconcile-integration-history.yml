name: Reconcile integration history

on:
  push:
    branches:
      - agent/complete-platform-integration

permissions:
  contents: write

jobs:
  merge-main:
    if: contains(github.event.head_commit.message, '[reconcile-main]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/complete-platform-integration
          fetch-depth: 0
      - name: Merge verified main ancestry into integration branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-ff -X ours origin/main -m "Merge verified main history into cumulative integration"
          git push origin HEAD:agent/complete-platform-integration
