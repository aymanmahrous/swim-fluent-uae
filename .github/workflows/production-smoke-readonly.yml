name: Production Smoke — Read Only

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read

concurrency:
  group: production-smoke-readonly
  cancel-in-progress: true

jobs:
  production-smoke-readonly:
    name: verify:production-readonly
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production-readonly
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund --loglevel=error

      - name: Verify Production pages and headers
        env:
          PRODUCTION_BASE_URL: https://www.relaxfixuae.com
          SMOKE_TIMEOUT_MS: "15000"
        run: npm run verify:production-smoke
