name: Production Smoke — Read Only

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read

concurrency:
  group: production-smoke-readonly
  cancel-in-progress: true

jobs:
  production-smoke-readonly:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify Production pages and headers
        env:
          PRODUCTION_BASE_URL: https://www.relaxfixuae.com
          SMOKE_TIMEOUT_MS: "15000"
        run: npm run verify:production-smoke
