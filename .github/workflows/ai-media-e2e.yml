name: AI Media E2E

on:
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: read
  id-token: write

jobs:
  ai-media-e2e:
    if: >-
      github.event.pull_request.number == 9 &&
      github.head_ref == 'agent/verify-ai-media-e2e' &&
      contains(github.event.pull_request.labels.*.name, 'ai-media-e2e')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      E2E_BASE_URL: https://swim-fluent-uae-w532-git-ag-a522bb-swimmingayman-8492s-projects.vercel.app
      E2E_CREDENTIALS_PATH: ${{ runner.temp }}/relax-fix-ai-media-e2e.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts --no-audit --no-fund --loglevel=error
      - run: npx playwright install --with-deps chromium
      - name: Provision isolated temporary staff
        run: node scripts/ai-media-e2e-admin.mjs provision
      - name: Run real AI Image and AI Video browser E2E
        run: npm run test:e2e:ai-media
      - name: Cleanup isolated E2E users and media
        if: always()
        run: node scripts/ai-media-e2e-admin.mjs cleanup
      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ai-media-e2e-diagnostics
          path: test-results
          if-no-files-found: ignore
