name: AI Media E2E

on:
  workflow_dispatch:
    inputs:
      confirm_production_writes:
        description: Confirm that this run may create and delete isolated Production test data and use paid AI providers
        required: true
        default: false
        type: boolean
      execution_reason:
        description: Non-secret operational reason for this Production run
        required: true
        type: string
      target_sha:
        description: Exact 40-character SHA of the current main commit to test
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  statuses: write

concurrency:
  group: production-ai-media-live-e2e
  cancel-in-progress: false

env:
  E2E_BASE_URL: https://swim-fluent-uae-w532.vercel.app
  E2E_ADMIN_URL: https://nmzxrjdxvmmzzmajrskm.supabase.co/functions/v1/ai-media-e2e-admin
  E2E_CREDENTIALS_PATH: /tmp/relax-fix-ai-media-e2e.json

jobs:
  ai-media-e2e:
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.confirm_production_writes == true && inputs.execution_reason != '' && inputs.target_sha == github.sha }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Validate manual Production authorization
        shell: bash
        env:
          EXECUTION_REASON: ${{ inputs.execution_reason }}
          TARGET_SHA: ${{ inputs.target_sha }}
        run: |
          set -euo pipefail
          reason="$(printf '%s' "$EXECUTION_REASON" | xargs)"
          if [[ -z "$reason" ]]; then
            echo "::error::A non-empty execution reason is required."
            exit 1
          fi
          if printf '%s' "$reason" | grep -Eiq '(secret|token|password|credential|api[ _-]?key|bearer|sb_secret_|sk-[A-Za-z0-9])'; then
            echo "::error::Execution reason must not contain secrets, tokens, credentials, or API keys."
            exit 1
          fi
          if [[ ! "$TARGET_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::target_sha must be an exact lowercase 40-character Git commit SHA."
            exit 1
          fi
          if [[ "$TARGET_SHA" != "$GITHUB_SHA" ]]; then
            echo "::error::target_sha must equal the selected main workflow commit."
            exit 1
          fi
          echo "Manual Production AI Media E2E authorization validated."
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - name: Publish pending AI Media E2E status
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: "pending",
              context: "AI Media E2E",
              description: "Real AI media browser E2E is running",
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
      - run: npm ci --ignore-scripts --no-audit --no-fund --loglevel=error
      - name: Wait for exact production deployment SHA
        run: node scripts/ai-media-e2e-admin.mjs wait
      - run: npx playwright install --with-deps chromium
      - name: Provision isolated temporary staff
        run: node scripts/ai-media-e2e-admin.mjs provision > e2e-provision.log 2>&1 || { cat e2e-provision.log; exit 1; }
      - name: Run real AI Image and AI Video browser E2E
        run: npm run test:e2e:ai-media
      - name: Cleanup isolated E2E users and media
        if: always()
        run: node scripts/ai-media-e2e-admin.mjs cleanup
      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ai-media-e2e-diagnostics
          path: |
            test-results
            e2e-provision.log
          if-no-files-found: ignore
      - name: Publish final AI Media E2E status
        if: always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const passed = process.env.JOB_STATUS === "success";
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? "success" : "failure",
              context: "AI Media E2E",
              description: passed
                ? "Real AI Image, AI Video, persistence and isolation E2E passed"
                : "Real AI media browser E2E failed",
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });