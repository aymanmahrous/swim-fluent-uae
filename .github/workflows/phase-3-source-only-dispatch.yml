name: Phase 3 Source-Only Verification

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: Exact 40-character SHA on agent/phase-a-source-of-truth
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: phase-3-source-only-${{ inputs.target_sha }}
  cancel-in-progress: true

env:
  CI: "true"

jobs:
  authorize:
    name: authorize:source-only-verification
    if: ${{ github.ref == 'refs/heads/agent/phase-a-source-of-truth' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate exact target SHA and branch tip
        shell: bash
        env:
          TARGET_SHA: ${{ inputs.target_sha }}
          DISPATCH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ ! "$TARGET_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo 'target_sha must be an exact lowercase 40-character SHA.' >&2
            exit 1
          fi
          if [[ "$TARGET_SHA" != "$DISPATCH_SHA" ]]; then
            echo 'target_sha must equal the selected governance-branch commit.' >&2
            exit 1
          fi

  verify-source:
    name: verify:source
    needs: authorize
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.target_sha }}
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: npm ci --ignore-scripts --no-audit --no-fund --loglevel=error
      - run: npm run verify:source

  test-unit:
    name: test:unit
    needs: authorize
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.target_sha }}
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: npm ci --ignore-scripts --no-audit --no-fund --loglevel=error
      - run: npm run test:unit

  test-security:
    name: test:security
    needs: authorize
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.target_sha }}
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: npm ci --ignore-scripts --no-audit --no-fund --loglevel=error
      - run: npm run test:security

  test-contracts:
    name: test:contracts
    needs: authorize
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.target_sha }}
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: npm ci --ignore-scripts --no-audit --no-fund --loglevel=error
      - run: npm run test:contracts

  verify-ci:
    name: verify:ci
    needs: [verify-source, test-unit, test-security, test-contracts]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.target_sha }}
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: npm ci --ignore-scripts --no-audit --no-fund --loglevel=error
      - run: npm run verify:ci

  verify-release:
    name: verify:release
    needs: verify-ci
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.target_sha }}
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: npm ci --ignore-scripts --no-audit --no-fund --loglevel=error
      - run: npm run verify:release
