name: Refresh integration lockfile

on:
  push:
    branches:
      - agent/alibaba-ai-provider-adapters

permissions:
  contents: write

jobs:
  refresh:
    # One-shot branch maintenance workflow. Deleted after the lockfile commit lands.
    if: contains(github.event.head_commit.message, '[refresh-lock]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/alibaba-ai-provider-adapters
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Reconcile package lock
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund
      - name: Commit lockfile if changed
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "package-lock.json already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Update package lock for AI media TUS upload"
          git push origin HEAD:agent/alibaba-ai-provider-adapters
